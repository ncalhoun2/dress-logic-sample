<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dress Logic Dumb</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #fff;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
      }

      main {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: min(280px, calc(100vw - 48px));
      }

      button {
        width: 100%;
        min-height: 48px;
        border: 1px solid #111;
        border-radius: 6px;
        background: #fff;
        color: #111;
        font: inherit;
        font-size: 16px;
        text-transform: capitalize;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 3px solid #7aa7ff;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <button type="button">outfit scanner</button>
      <button type="button">chatbot</button>
      <button type="button">qr code scanner</button>
    </main>
  </body>
</html>
